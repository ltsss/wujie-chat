app:
  name: 無界茶台客服助手-信息收集版
  mode: chatflow

workflow:
  nodes:
    - id: start
      type: start
      data:
        title: 开始
        variables:
          - variable: query
            type: string
            required: true

    - id: intent_recognition
      type: llm
      data:
        title: 意图识别
        model:
          provider: openai
          name: gpt-4o-mini
          mode: chat
        prompt_template:
          - role: system
            text: |
              你是無界茶台的意图识别助手。分析用户输入，判断意图类别：
              
              【意图类别】
              1. TRANSFER - 用户要求转人工客服
                 关键词：转人工、人工客服、找真人、人工、客服在吗、有人吗、不要机器人
              
              2. COLLECT - 正在收集购买信息（预算、城市、地点、材质、系列）
              
              3. NORMAL - 其他普通咨询
              
              【输出要求】
              只输出意图类别名称（大写），不要解释。
              例如：TRANSFER 或 COLLECT 或 NORMAL
          - role: user
            text: |
              用户输入：{{#start.query#}}
              
              意图类别：
        variables:
          - variable: intent
            type: string

    - id: check_vars
      type: code
      data:
        title: 检查已收集变量
        code: |
          def main(query: str, budget: str = "", city: str = "", location: str = "", material: str = "", series: str = "") -> dict:
              query = query.strip()
              
              # 识别预算
              budget_map = {
                  "1": "5000以下", "5000以下": "5000以下",
                  "2": "5000-10000", "5000-10000": "5000-10000",
                  "3": "10000-20000", "10000-20000": "10000-20000",
                  "4": "20000以上", "20000以上": "20000以上"
              }
              
              # 识别使用地点
              location_map = {
                  "1": "家庭客厅", "家庭": "家庭客厅", "客厅": "家庭客厅",
                  "2": "办公室", "办公": "办公室",
                  "3": "茶室",
                  "4": "会所/酒店", "会所": "会所/酒店", "酒店": "会所/酒店"
              }
              
              # 识别材质
              material_map = {
                  "1": "实木", "实木": "实木", "胡桃木": "实木", "花梨": "实木",
                  "2": "岩板", "岩板": "岩板",
                  "3": "智能", "智能": "智能", "科技": "智能"
              }
              
              # 识别系列
              series_map = {
                  "1": "经典系列", "经典": "经典系列",
                  "2": "现代系列", "现代": "现代系列",
                  "3": "禅意系列", "禅意": "禅意系列"
              }
              
              # 更新变量
              new_budget = budget
              new_city = city
              new_location = location
              new_material = material
              new_series = series
              
              # 检查是否匹配预算
              if not budget and query in budget_map:
                  new_budget = budget_map[query]
              # 检查是否匹配地点
              elif not location and query in location_map:
                  new_location = location_map[query]
              # 检查是否匹配材质
              elif not material and query in material_map:
                  new_material = material_map[query]
              # 检查是否匹配系列
              elif not series and query in series_map:
                  new_series = series_map[query]
              # 否则当作城市（如果还没填且长度合适）
              elif not city and len(query) >= 2 and query not in budget_map and query not in location_map:
                  new_city = query
              
              # 检查缺失字段
              missing = []
              if not new_budget:
                  missing.append("budget")
              if not new_city:
                  missing.append("city")
              if not new_location:
                  missing.append("location")
              if not new_material:
                  missing.append("material")
              if not new_series:
                  missing.append("series")
              
              return {
                  "budget": new_budget,
                  "city": new_city,
                  "location": new_location,
                  "material": new_material,
                  "series": new_series,
                  "missing": missing,
                  "next": missing[0] if missing else "",
                  "complete": len(missing) == 0
              }
        inputs:
          - name: query
            type: string
            value: "{{#start.query#}}"
          - name: budget
            type: string
            value: "{{#会话变量.budget#}}"
          - name: city
            type: string
            value: "{{#会话变量.city#}}"
          - name: location
            type: string
            value: "{{#会话变量.location#}}"
          - name: material
            type: string
            value: "{{#会话变量.material#}}"
          - name: series
            type: string
            value: "{{#会话变量.series#}}"
        outputs:
          - name: budget
            type: string
          - name: city
            type: string
          - name: location
            type: string
          - name: material
            type: string
          - name: series
            type: string
          - name: missing
            type: array[string]
          - name: next
            type: string
          - name: complete
            type: boolean

    - id: variable_assign
      type: variable-assigner
      data:
        title: 更新会话变量
        variables:
          - variable: budget
            value: "{{#check_vars.budget#}}"
          - variable: city
            value: "{{#check_vars.city#}}"
          - variable: location
            value: "{{#check_vars.location#}}"
          - variable: material
            value: "{{#check_vars.material#}}"
          - variable: series
            value: "{{#check_vars.series#}}"

    - id: branch
      type: if-else
      data:
        title: 条件分支
        conditions:
          - id: transfer
            name: 转人工
            expression: "{{#intent_recognition.intent#}} == 'TRANSFER'"
          - id: complete
            name: 信息齐全
            expression: "{{#check_vars.complete#}} == true"
          - id: ask_budget
            name: 问预算
            expression: "{{#check_vars.next#}} == 'budget'"
          - id: ask_city
            name: 问城市
            expression: "{{#check_vars.next#}} == 'city'"
          - id: ask_location
            name: 问地点
            expression: "{{#check_vars.next#}} == 'location'"
          - id: ask_material
            name: 问材质
            expression: "{{#check_vars.next#}} == 'material'"
          - id: ask_series
            name: 问系列
            expression: "{{#check_vars.next#}} == 'series'"

    - id: http_transfer
      type: http-request
      data:
        title: 调用转人工API
        method: POST
        url: http://localhost:3000/api/transfer
        headers: |
          Content-Type: application/json
        body: |
          {
            "userId": "{{#sys.user_id#}}",
            "conversationId": "{{#sys.conversation_id#}}",
            "reason": "{{#start.query#}}"
          }
        timeout: 10

    - id: reply_transfer
      type: answer
      data:
        title: 转人工回复
        answer: |
          正在为您转接人工客服，请稍候...
          
          之前的聊天记录会同步给客服，请耐心等待。

    - id: ask_budget_node
      type: answer
      data:
        title: 询问预算
        answer: |
          为了更好地为您推荐茶台，请告诉我：
          
          【1/5】您的预算范围？
          1️⃣ 5000以下
          2️⃣ 5000-10000
          3️⃣ 10000-20000
          4️⃣ 20000以上
          
          请回复数字 1-4

    - id: ask_city_node
      type: answer
      data:
        title: 询问城市
        answer: |
          【2/5】您所在的城市？
          （直接回复城市名，如：上海、北京）

    - id: ask_location_node
      type: answer
      data:
        title: 询问使用地点
        answer: |
          【3/5】主要使用场景？
          1️⃣ 家庭客厅
          2️⃣ 办公室
          3️⃣ 茶室
          4️⃣ 会所/酒店
          
          请回复数字 1-4

    - id: ask_material_node
      type: answer
      data:
        title: 询问材质
        answer: |
          【4/5】您偏好的材质？
          1️⃣ 实木（传统典雅）
          2️⃣ 岩板（现代简约）
          3️⃣ 智能（科技便捷）
          
          请回复数字 1-3

    - id: ask_series_node
      type: answer
      data:
        title: 询问系列
        answer: |
          【5/5】您喜欢的风格系列？
          1️⃣ 经典系列
          2️⃣ 现代系列
          3️⃣ 禅意系列
          
          请回复数字 1-3

    - id: knowledge_retrieval
      type: knowledge-retrieval
      data:
        title: 知识检索
        query_variable: "{{#start.query#}}"
        knowledge_id: "無界茶台客服知识库-pgc"
        top_k: 3

    - id: recommend_llm
      type: llm
      data:
        title: 产品推荐
        model:
          provider: openai
          name: gpt-4o-mini
          mode: chat
        prompt_template:
          - role: system
            text: 你是無界茶台的顾问小珍，专业、热情、温润友好。根据用户信息推荐合适的茶台。
          - role: user
            text: |
              【用户需求】
              - 预算：{{#会话变量.budget#}}
              - 城市：{{#会话变量.city#}}
              - 使用场景：{{#会话变量.location#}}
              - 偏好材质：{{#会话变量.material#}}
              - 风格系列：{{#会话变量.series#}}
              
              【知识库信息】
              {{#knowledge_retrieval.result#}}
              
              请：
              1. 根据预算和偏好推荐1-2款最适合的茶台
              2. 说明推荐理由（尺寸适配、风格匹配、性价比等）
              3. 告知大概价格区间
              4. 询问是否需要预约到店体验或安排顾问详细沟通
              
              语气专业、亲切，像经验丰富的茶台顾问。

    - id: final_answer
      type: answer
      data:
        title: 最终回复
        answer: "{{#recommend_llm.text#}}"

  edges:
    - source: start
      target: intent_recognition
    - source: intent_recognition
      target: check_vars
    - source: check_vars
      target: variable_assign
    - source: variable_assign
      target: branch
    - source: branch
      target: http_transfer
      condition: transfer
    - source: branch
      target: knowledge_retrieval
      condition: complete
    - source: branch
      target: ask_budget_node
      condition: ask_budget
    - source: branch
      target: ask_city_node
      condition: ask_city
    - source: branch
      target: ask_location_node
      condition: ask_location
    - source: branch
      target: ask_material_node
      condition: ask_material
    - source: branch
      target: ask_series_node
      condition: ask_series
    - source: http_transfer
      target: reply_transfer
    - source: knowledge_retrieval
      target: recommend_llm
    - source: recommend_llm
      target: final_answer

conversation_variables:
  - name: budget
    type: string
    default: ""
  - name: city
    type: string
    default: ""
  - name: location
    type: string
    default: ""
  - name: material
    type: string
    default: ""
  - name: series
    type: string
    default: ""
